# This profile is for running the application on the local server

# This is the set the server port number
server.port=8080

# To configure the data source
spring.datasource.url=jdbc:mysql://localhost:3306/movie-app?useSSL=false


# Database username
spring.datasource.username=root

# Database user password
spring.datasource.password=root

# MySQL driver class name
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# To set the default database style dialect to MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Database platform name
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# To display the SQL queries on to console
#spring.jpa.show-sql=true

# Do not clear database everytime the application starts
spring.jpa.hibernate.ddl-auto=update
